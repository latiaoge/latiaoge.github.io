<head>
    <meta charset="UTF-8">
    <title>XLIAgent | AGI Personnel Office</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --bg-dark: #02040a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            position: relative;
        }

        .cyber-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
            transform: rotateX(60deg) translateY(-20%);
            z-index: -1;
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
        }

        .aurora-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.1), transparent 50%);
            z-index: -2;
            filter: blur(100px);
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            opacity: 0;
            z-index: 9998;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .video-item {
            position: relative;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
            transform-origin: center center;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 340px;
            min-height: 400px;
        }

        .video-item:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.15);
            transform: translateY(-15px) rotate(var(--card-rotate, 0deg)) scale(1.02) !important;
            z-index: 99;
        }

        .scanning-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            opacity: 0.5;
            animation: scan 3s linear infinite;
            z-index: 11;
        }

        .projection-beam {
            position: absolute;
            bottom: -10px;
            width: 60%;
            height: 30px;
            background: var(--neon-blue);
            filter: blur(30px);
            opacity: 0.3;
            border-radius: 50%;
            animation: pulse 4s infinite;
            z-index: 0;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            padding-top: 20px;
        }

        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: screen;
            filter: grayscale(100%);
            transition: filter 0.3s ease, transform 0.5s ease;
            z-index: 1;
        }

        .video-item:hover video {
            filter: grayscale(0%);
            transform: scale(1.1);
        }

        .video-item.zoom-fly {
            transition: all 0.5s cubic-bezier(0.65, 0, 0.35, 1);
            z-index: 9999 !important;
        }

        .video-item.active video { filter: grayscale(0%) !important; }

        .hud-data {
            font-family: 'Syncopate', sans-serif;
            font-size: 8px;
            letter-spacing: 1px;
            color: var(--neon-blue);
            opacity: 0.8;
        }

        .agent-id-tag {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            position: absolute;
            right: 10px;
            top: 30px;
            font-size: 9px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 3px;
        }

        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.2); } }
    </style>
</head>
